services:
  web:
    build: .
    ports:
      - "${TYPHON_PORT:-8080}:80"
    environment:
      - FLAG=${TYPHON_FLAG}
      - LAB_ID=${TYPHON_LAB_ID}
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=typhon
      - DB_NAME=app
    mem_limit: ${TYPHON_MEMORY:-512m}
    cpus: ${TYPHON_CPUS:-1.0}
    pids_limit: 256
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: typhon
      MYSQL_DATABASE: app
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
