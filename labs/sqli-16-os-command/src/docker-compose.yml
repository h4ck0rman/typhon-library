services:
  web:
    build: .
    ports:
      - "${TYPHON_PORT:-8080}:80"
    environment:
      - FLAG=${TYPHON_FLAG}
      - LAB_ID=${TYPHON_LAB_ID}
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASS=typhon
      - DB_NAME=app
    mem_limit: ${TYPHON_MEMORY:-512m}
    cpus: ${TYPHON_CPUS:-1.0}
    pids_limit: 256
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: typhon
      POSTGRES_DB: app
      TYPHON_FLAG: ${TYPHON_FLAG}
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
